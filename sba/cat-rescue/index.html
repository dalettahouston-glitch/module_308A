<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cat Rescue Center</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="header">
    <h1>🐱 Cat Rescue Center</h1>
  </header>

  <!-- Search Section -->
  <section class="search-section">
    <form id="search-form">
      <input
        type="text"
        id="search-input"
        placeholder="Search cats by breed..."
      />
      <button type="submit">Search</button>
    </form>
  </section>

  <!-- Pagination Controls -->
  <section class="pagination">
    <button id="prev-page">Prev</button>
    <span id="page-info">Page 1</span>
    <button id="next-page">Next</button>
  </section>

  <!-- Message Area -->
  <p id="message" class="message"></p>

  <!-- Available Cats -->
  <section>
    <h2>Available Cats</h2>
    <div id="cats-container" class="cats-grid"></div>
  </section>

  <!-- Favorite Cats -->
  <section>
    <h2>Favorite Cats (Adoption List)</h2>
    <div id="favorites-container" class="favorites-grid"></div>
  </section>

  <script type="module" src="main.js"></script>
</body>
</html>
